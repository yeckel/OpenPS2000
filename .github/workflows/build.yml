name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  QT_VERSION: '6.9.2'

jobs:
  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgl1-mesa-dev libdbus-1-dev ninja-build libfuse2 \
            libglib2.0-dev libpulse-dev libudev-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtserialport'

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release app/
          cmake --build build --parallel

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Create AppImage
        env:
          OUTPUT: OpenPS2000-linux-x86_64.AppImage
          QMAKE: qmake6
          QML_SOURCES_PATHS: ${{ github.workspace }}/app/qml
          EXTRA_QT_MODULES: "qml;quick;quickcontrols2;serialport;labsplatform"
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/bin/openps2000app  AppDir/usr/bin/
          cp app/openps2000.png       AppDir/usr/share/icons/hicolor/256x256/apps/openps2000.png
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file app/openps2000.desktop \
            --icon-file app/openps2000.png \
            --plugin qt \
            --output appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: OpenPS2000-linux-x86_64.AppImage

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (zip)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          modules: 'qtserialport'

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release app/
          cmake --build build --parallel

      - name: Deploy with windeployqt
        shell: cmd
        run: |
          mkdir deploy
          copy build\bin\openps2000app.exe deploy\
          windeployqt --release --qmldir app\qml deploy\openps2000app.exe

      - name: Package as zip
        shell: powershell
        run: Compress-Archive -Path deploy\* -DestinationPath OpenPS2000-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: OpenPS2000-windows-x86_64.zip

  # ── macOS ─────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (dmg)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtserialport'

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release app/
          cmake --build build --parallel

      - name: Deploy with macdeployqt
        run: |
          macdeployqt build/bin/openps2000app.app -qmldir=app/qml
          cd build/bin
          zip -r ../../OpenPS2000-macos.zip openps2000app.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: OpenPS2000-macos.zip

  # ── Android ───────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.3.11579264" \
            "platform-tools"

      - name: Install Qt for Android (arm64-v8a) + desktop host tools
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: android
          arch: android_arm64_v8a
          modules: 'qtserialport'
          extra: '--autodesktop'

      - name: Build APK
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264
        run: |
          cmake -B build-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DCMAKE_FIND_ROOT_PATH=$QT_ROOT_DIR \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            android/
          cmake --build build-android --parallel

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > /tmp/release.jks
          UNSIGNED=build-android/android-build/build/outputs/apk/release/android-build-release-unsigned.apk
          APKSIGNER=$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner
          $APKSIGNER sign \
            --ks /tmp/release.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_STORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out OpenPS2000-android-arm64.apk \
            "$UNSIGNED"
          $APKSIGNER verify OpenPS2000-android-arm64.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: OpenPS2000-android-arm64.apk

  # ── GitHub Release (manual only — run workflow_dispatch on a release-v* tag) ──
  # Disabled: run `gh workflow run build.yml` or create a release manually when ready.
  # release:
  #   ...
